name: CI — Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ci-

      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          # Install lightweight CI requirements (no torch / heavy ML packages)
          pip install -r requirements-ci.txt

      - name: Set dummy env variables for tests
        run: |
          echo "OPENROUTER_API_KEY=test-key" >> $GITHUB_ENV
          echo "HF_TOKEN=test-token" >> $GITHUB_ENV

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/
