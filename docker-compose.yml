version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: medical-rag-assistant:latest
    container_name: medical_rag_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data/cache:/app/data/cache   # persist downloaded articles cache
      - ./data/raw:/app/data/raw       # read-only raw medical data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
